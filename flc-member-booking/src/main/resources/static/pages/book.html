<section id="book" class="pane">
    <div class="page-title">Book a Lesson</div>
    <form id="book-form">
        <div class="form-row">
            <label>Member:</label>
            <select id="book-member"></select>
        </div>
        <div class="form-row">
            <label>Lesson ID:</label>
            <input id="book-lesson-id" placeholder="W01-SAT-A">
        </div>
        <div class="form-row">
            <button type="submit">Book</button>
        </div>
    </form>
    <div id="book-result" class="result"></div>
</section>
